<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Precios agropecuarios · Bolivia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
  :root{
    --bg: #171B18;
    --bg-panel: #1E231F;
    --bg-input: #12150F;
    --line: #33392F;
    --line-soft: #262B22;
    --text: #EDEAD4;
    --text-dim: #9BA192;
    --grain: #D9A441;
    --grain-dim: #6B5729;
    --soy: #8CAE7C;
    --soy-dim: #3E4F35;
    --freight: #7FA6C4;
    --freight-dim: #35434E;
    --error: #D97757;
    --radius: 6px;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'JetBrains Mono', monospace;
    font-size:14px;
    line-height:1.6;
    padding:0 0 80px;
  }
  h1,h2,h3{
    font-family:'Fraunces', serif;
    font-weight:500;
    margin:0;
    letter-spacing:-0.01em;
  }
  header{
    padding:48px 32px 32px;
    border-bottom:1px solid var(--line);
    max-width:1080px;
    margin:0 auto;
  }
  header .eyebrow{
    color:var(--text-dim);
    text-transform:uppercase;
    letter-spacing:0.12em;
    font-size:11px;
    margin-bottom:10px;
  }
  header h1{font-size:32px;}
  header p{color:var(--text-dim); margin-top:10px; font-size:13px;}
  main{max-width:1080px; margin:0 auto; padding:0 32px;}
  section{margin-top:56px;}
  section > h2{
    font-size:20px;
    margin-bottom:4px;
  }
  section > .sub{color:var(--text-dim); font-size:12px; margin-bottom:20px;}
  .group-label{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.1em;
    padding:4px 10px;
    border-radius:999px;
    margin-bottom:16px;
  }
  .group-label.grain{color:var(--grain); background:var(--grain-dim);}
  .group-label.soy{color:var(--soy); background:var(--soy-dim);}
  .group-label.freight{color:var(--freight); background:var(--freight-dim);}
  .chart-panel{
    background:var(--bg-panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:20px;
    margin-bottom:24px;
  }
  .chart-panel canvas{max-height:280px;}
  .empty-state{
    color:var(--text-dim);
    font-size:13px;
    padding:32px 0;
    text-align:center;
    border:1px dashed var(--line);
    border-radius:var(--radius);
  }

  /* manual entry module */
  #manual-entry{
    border-top:1px solid var(--line);
    padding-top:40px;
  }
<section id="manual-entry">
  <h2>Agregar datos manualmente</h2>
  <div class="sub">Use el formulario para registrar nuevos precios. Los datos se sincronizan al panel automáticamente cada hora.</div>
  <a href="https://forms.gle/FMN4Vvt1vFatUPZD8" target="_blank" rel="noopener"
     style="display:inline-block; margin-top:12px; padding:12px 24px; background:var(--grain); color:#1A1500; font-weight:700; text-decoration:none; border-radius:4px; font-family:'JetBrains Mono', monospace;">
    Abrir formulario de registro →
  </a>
</section>
  }
</style>
</head>

</html>
