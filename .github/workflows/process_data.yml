name: Process Weekly Commodity Data

on:
  push:
    paths:
      - 'data/latest.csv' # Triggers only when this specific data file updates
  workflow_dispatch: # Allows you to force-run this manually from the GitHub website

jobs:
  update-dashboard-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set Up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Data Processing Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Run Python Parsing Script
        run: python process_data.py

      - name: Commit and Push Compiled Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add processed/history.json
          
          # Only commit if there are actual new entries to prevent infinite loop errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "System: Auto-compiled latest.csv data entries" && git push)
