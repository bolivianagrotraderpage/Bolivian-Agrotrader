name: Refresh Dashboard Data

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour. Change to '0 0 * * *' for daily.
  workflow_dispatch: # Allows you to trigger the update manually via GitHub UI

jobs:
  sync-sheets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Ensure Data Directory Exists
        run: mkdir -p data

      - name: Fetch Latest Data from Google Sheets
        run: |
          curl -L "https://docs.google.com/spreadsheets/d/e/2PACX-1vRszhjoiukvU6N9Dw3VF_I5z40ZzFU4-FL1ltZ_y1yTMStGUdysdyhF7jC6vcMJSE7C7PYH9TBpPrVR/pub?gid=1172088102&single=true&output=csv" -o data/history.csv

      - name: Commit and Push if Data Changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/history.csv
          
          # Only commit if there are changes to avoid empty commits
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated update: Synced commodity data from Google Sheets" && git push)
