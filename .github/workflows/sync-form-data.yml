name: Sync form responses to history.json

on:
  schedule:
    - cron: '0 * * * *'   # every hour — change to '0 6 * * *' for daily at 06:00 UTC
  workflow_dispatch: {}    # lets you trigger it manually from the Actions tab

permissions:
  contents: write
  issues: write   # needed only for the failure-notification step below

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync Google Form responses into history.json
        id: sync
        run: python data/sync_form_to_history.py

      - name: Commit updated history.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add processed/history.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Sync form responses [skip ci]"

          # This runs hourly and sync-costos-history.yml runs daily on
          # the same branch, so the remote can move between checkout and
          # push. Rebase onto the latest and retry a few times rather
          # than failing outright on a non-fast-forward push.
          for attempt in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt/5) - pulling and retrying..."
            git pull --rebase origin main
            sleep $((RANDOM % 10 + 3))
          done
          echo "Push still failing after 5 attempts."
          exit 1

      # If the sync step fails (bad fetch, empty sheet, malformed data),
      # this opens a GitHub issue instead of failing silently at 3am.
      - name: Open an issue if sync failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Dashboard sync failed — ${new Date().toISOString().slice(0,10)}`,
              body: `The scheduled sync from the Google Sheet to \`processed/history.json\` failed.\n\nCheck the run log: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
